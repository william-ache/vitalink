name: vitalink
description: "A premium medical and health application."
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  go_router: ^17.2.3
  google_maps_flutter: ^2.5.3
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.0
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icono.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
